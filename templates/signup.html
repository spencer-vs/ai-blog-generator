<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans anitialiased">
    <!-- NavBar -->
     <nav class="bg-blue-600 p-4 text-white flex justify-between">
        <div>
            <h1 class="text-3xl font-bold">AI Blog Generator</h1>
        </div>
        <div>
            <a href="login/" class=" text-white hover:underline">Sign In</a>
            <a href="signup/" class=" text-white hover:underline">Sign Up</a>
        </div>
     </nav>


     <br>
     <!-- Main Content -->

     <div class="flex items-center justify-center h-screen shadow-md ">
        <div class="bg-white p-8 shadow-md rounded-lg max-w-md w-full">

            <!-- signup form -->
             <form  class="space-y-4" action="" method="POST">
                 {% csrf_token %}

                {% if error_message %}
                 <div align="center" style="color: red;">
                    <h2>
                       {{ error_message }}
                    </h2>
                 </div>
                 {% endif %}
               
                <h2 class="text-xl font-semibold">
                Sign Up
                </h2>   

                <div>
                    <label for="username" class="block mb-1 font-medium">Username</label>
                    <input type="text" id="username" name="username" class="w-full p-2 border rounded" placeholder="Enter your username...">
                </div>


                 <div>
                    <label for="email" class="block mb-1 font-medium">Email</label>
                    <input type="email" id="email" name="email" class="w-full p-2 border rounded" placeholder="Enter your email...">
                </div>

                <div>
                    <label for="password" class="block mb-1 font-medium">Password</label>
                    <input type="password" id="password" name="password" class="w-full p-2 border rounded" placeholder="Enter your password...">
                </div>


                <div>
                    <label for="repeatPassword" class="block mb-1 font-medium">Repeat Password</label>
                    <input type="password" id="repeatPassword" name="repeatPassword" class="w-full p-2 border rounded" placeholder="Repeat your password...">
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white rounded p-2 hover:bg-blue-700">Sign Up</button>
             </form>

        </div>
     </div>
</body>
</html>
